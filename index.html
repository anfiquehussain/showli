<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon_without_bg(v).png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Plan, discover, and organize your movies and TV shows with ShowLi." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ShowLi | Your Ultimate Movie Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=Plaster&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Static Preloader to prevent blank white screen before JS executes -->
      <style>
        #preloader {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: #09090b;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .preloader-logo {
          width: 96px;
          height: 96px;
          display: flex;
          align-items: center;
          justify-content: center;
          animation: pulse-glow 2.5s infinite ease-in-out;
        }
        .preloader-img {
          width: 56px;
          height: 56px;
        }
        .preloader-title {
          margin-top: 24px;
          font-size: 32px;
          font-weight: 800;
          letter-spacing: 0.05em;
          color: #ffffff;
          background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        @keyframes pulse-glow {
          0%, 100% {
            transform: scale(0.95);
            opacity: 0.8;
          }
          50% {
            transform: scale(1.05);
            opacity: 1;
          }
        }
      </style>
      <div id="preloader">
        <div class="preloader-logo">
          <img class="preloader-img" src="/icon_without_bg(v).png" alt="ShowLi" />
        </div>
        <div class="preloader-title">ShowLi</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
